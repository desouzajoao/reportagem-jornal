<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Reportagem</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: auto;
      line-height: 1.6;
    }
    h1 { font-size: 32px; }
    h2 { font-size: 22px; margin-top: 40px; }
    .linha-fina {
      font-style: italic;
      color: gray;
    }
    .imagem {
      margin: 20px 0;
    }
    .legenda {
      font-size: 14px;
      color: #555;
    }
  </style>
</head>
<body>

  <!-- MATÉRIA PRINCIPAL -->
  <h1>TÍTULO PRINCIPAL</h1>
  <p class="linha-fina">Linha fina da matéria principal</p>

  <div class="imagem">
    <img src="imagem1.jpg" width="100%">
    <p class="legenda">Legenda da imagem principal</p>
  </div>

  <p>Corpo da matéria principal...</p>

  <!-- MATÉRIAS SECUNDÁRIAS -->
  <h2>Título matéria 1</h2>
  <div class="imagem">
    <img src="imagem2.jpg" width="100%">
    <p class="legenda">Legenda</p>
  </div>
  <p>Texto da matéria...</p>

  <h2>Título matéria 2</h2>
  <p>Texto...</p>

  <h2>Título matéria 3</h2>
  <p>Texto...</p>

  <h2>Título matéria 4</h2>
  <p>Texto...</p>

</body>
</html>
